<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <!-- Clipboard shape -->
    <rect x="30" y="24" width="68" height="84" rx="8" fill="rgba(255,255,255,0.15)"/>
    <rect x="44" y="16" width="40" height="14" rx="7" fill="rgba(255,255,255,0.25)"/>
    <!-- Md text -->
    <text x="64" y="82" font-size="40" font-weight="800" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" letter-spacing="-1">Md</text>
  </g>
</svg>
